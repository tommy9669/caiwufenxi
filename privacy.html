# Privacy Policy

## 1. 数据收集
本应用仅访问 TikTok Shop 店铺的订单、商品和销售数据，用于利润计算和报表生成。应用不会收集其他个人信息。

## 2. 数据使用
收集的数据仅用于：
- 生成每日、每周、每月利润报表
- SKU 成本匹配和销售分析

## 3. 数据存储
所有数据均存储在用户本地计算机，不会上传至第三方服务器（除非用户主动导出）。

## 4. 数据共享
本应用不会向任何第三方分享用户店铺数据。

## 5. 用户权利
用户可以随时删除本地数据或停止使用本应用。

## 6. 协议更新
隐私政策可能会根据应用功能更新进行修改，更新后会在本页面公布。
